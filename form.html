<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <style>
        body {
            background-color: cyan;
            font-family: Arial, sans-serif;
        }
        .title {
            font-weight: bold;
            font-size: 22px;
            text-align: center;
            border: 1px solid black;
            padding: 10px;
            margin-top: 20px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            background-color: transparent;
        }
        .form-container {
            margin-top: 30px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        label {
            display: inline-block;
            width: 140px;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], select {
            width: 220px;
            padding: 3px;
            margin-bottom: 8px;
        }
        .gender, .department, .course {
            margin-bottom: 8px;
        }
        .gender label, .department label, .course label {
            width: auto;
            display: inline;
            margin-right: 10px;
        }
        button {
            padding: 5px 15px;
            margin: 10px 5px 0 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="title">Student registration from</div>
    <div class="form-container">
        <form>
            <label for="name">Name:-</label>
            <input type="text" id="name" name="name" placeholder="Enter Your Name" required><br>

            <label for="fatherName">Father's Name:-</label>
            <input type="text" id="fatherName" name="fatherName" required><br>

            <label for="motherName">Mother's Name:-</label>
            <input type="text" id="motherName" name="motherName" required><br>

            <label for="phone">Phone:-</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" title="Enter 10 digit phone number" required><br>

            <label for="email">Email:-</label>
            <input type="email" id="email" name="email" placeholder="abc@abc.com" required><br>

            <label>Gender:-</label>
            <div class="gender">
                <label><input type="radio" name="gender" value="Male" required> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
                <label><input type="radio" name="gender" value="Other"> Other</label>
            </div>

            <label for="dob">Date of Birth:-</label>
            <input type="date" id="dob" name="dob" required><br>

            <label for="address">Address:-</label>
            <input type="text" id="address" name="address" placeholder="Street:- House:- Road:-" required><br>

            <label for="bloodGroup">Blood group:-</label>
            <select id="bloodGroup" name="bloodGroup" required>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select><br>

            <label>Department</label>
            <div class="department">
                <label><input type="radio" name="department" value="CSE" required> CSE</label>
                <label><input type="radio" name="department" value="EEE"> EEE</label>
                <label><input type="radio" name="department" value="BBA"> BBA</label>
            </div>

            <label>Course:-</label>
            <div class="course">
                <label><input type="checkbox" name="course" value="c"> c</label>
                <label><input type="checkbox" name="course" value="c++"> c++</label>
                <label><input type="checkbox" name="course" value="Java"> Java</label>
                <label><input type="checkbox" name="course" value="AI"> AI</label>
                <label><input type="checkbox" name="course" value="Machine Learning"> Machine Learning</label>
                <label><input type="checkbox" name="course" value="Robotic"> Robotic</label>
            </div>

            <label for="photo">Photo:-</label>
            <input type="file" id="photo" name="photo" accept="image/*"><br><br>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>

        </form>
    </div>
</body>
</html>
