<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator | Bhavesh</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f0d;
      --card: #111a15;
      --border: #1e3028;
      --accent: #16a34a;
      --accent2: #4ade80;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #ef4444;
      --warn: #f59e0b;
      --good: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      background-image: radial-gradient(ellipse at 10% 10%, rgba(22,163,74,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 90% 90%, rgba(74,222,128,0.06) 0%, transparent 60%);
    }

    .container { width: 100%; max-width: 520px; }

    .header { margin-bottom: 32px; }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #4ade80, #16a34a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      margin-top: 6px;
    }

    .password-display {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
    }

    .password-text {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      color: var(--accent2);
      word-break: break-all;
      line-height: 1.6;
      min-height: 32px;
      letter-spacing: 1px;
    }

    .password-text.empty { color: var(--muted); font-size: 0.85rem; }

    .copy-btn {
      margin-top: 14px;
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .copy-btn:hover { background: #15803d; transform: scale(1.02); }
    .copy-btn:active { transform: scale(0.98); }
    .copy-btn.copied { background: #065f46; }

    /* Strength bar */
    .strength-bar {
      margin-bottom: 24px;
    }

    .strength-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .strength-label span:last-child { font-weight: 700; }

    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease, background 0.4s ease;
      width: 0%;
    }

    /* Options */
    .options-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .option-row:last-child { border-bottom: none; padding-bottom: 0; }
    .option-row:first-child { padding-top: 0; }

    .option-label {
      font-size: 0.9rem;
      color: var(--text);
    }

    .option-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Toggle Switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    /* Length Slider */
    .length-row {
      padding: 10px 0 0;
    }

    .length-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .length-val {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
      height: 4px;
    }

    .generate-btn {
      width: 100%;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent2);
      border-radius: 12px;
      padding: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .generate-btn:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.02);
    }

    .history {
      margin-top: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
    }

    .history h3 {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .history-item:last-child { border-bottom: none; }
    .history-item:hover { color: var(--accent2); }
    .history-item span { font-size: 0.65rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PassGen</h1>
    <p>// secure password generator</p>
  </div>

  <div class="password-display">
    <div class="password-text empty" id="passDisplay">// click generate to create password</div>
    <button class="copy-btn" id="copyBtn" onclick="copyPassword()">📋 Copy Password</button>
  </div>

  <div class="strength-bar">
    <div class="strength-label">
      <span>PASSWORD STRENGTH</span>
      <span id="strengthText">—</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
  </div>

  <div class="options-card">
    <div class="length-row">
      <div class="length-header">
        <span style="font-size:0.9rem">Password Length</span>
        <span class="length-val" id="lengthVal">16</span>
      </div>
      <input type="range" id="lengthSlider" min="6" max="64" value="16"
             oninput="document.getElementById('lengthVal').textContent = this.value"/>
    </div>

    <div class="option-row" style="margin-top:10px">
      <div>
        <div class="option-label">Uppercase Letters</div>
        <div class="option-sub">A B C ... Z</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="uppercase" checked/>
        <span class="slider"></span>
      </label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Lowercase Letters</div>
        <div class="option-sub">a b c ... z</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="lowercase" checked/>
        <span class="slider"></span>
      </label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Numbers</div>
        <div class="option-sub">0 1 2 ... 9</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="numbers" checked/>
        <span class="slider"></span>
      </label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Symbols</div>
        <div class="option-sub">! @ # $ % ^ & *</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="symbols"/>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="generate-btn" onclick="generatePassword()">⚡ GENERATE PASSWORD</button>

  <div class="history" id="historyBox" style="display:none">
    <h3>// RECENT PASSWORDS</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
  let currentPassword = '';
  let history = [];

  function generatePassword() {
    const length = parseInt(document.getElementById('lengthSlider').value);
    const useUpper = document.getElementById('uppercase').checked;
    const useLower = document.getElementById('lowercase').checked;
    const useNums = document.getElementById('numbers').checked;
    const useSyms = document.getElementById('symbols').checked;

    let chars = '';
    if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
    if (useNums)  chars += '0123456789';
    if (useSyms)  chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

    if (!chars) { alert('Please select at least one character type!'); return; }

    let password = '';
    for (let i = 0; i < length; i++) {
      password += chars[Math.floor(Math.random() * chars.length)];
    }

    currentPassword = password;
    document.getElementById('passDisplay').textContent = password;
    document.getElementById('passDisplay').classList.remove('empty');

    updateStrength(password, useUpper, useLower, useNums, useSyms);
    addToHistory(password);
  }

  function updateStrength(pass, u, l, n, s) {
    const types = [u, l, n, s].filter(Boolean).length;
    let score = 0;
    if (pass.length >= 8)  score++;
    if (pass.length >= 12) score++;
    if (pass.length >= 20) score++;
    if (types >= 2) score++;
    if (types >= 4) score++;

    const levels = [
      { label: 'WEAK',    color: '#ef4444', width: '20%' },
      { label: 'WEAK',    color: '#ef4444', width: '30%' },
      { label: 'FAIR',    color: '#f59e0b', width: '50%' },
      { label: 'GOOD',    color: '#84cc16', width: '70%' },
      { label: 'STRONG',  color: '#22c55e', width: '88%' },
      { label: 'VERY STRONG', color: '#4ade80', width: '100%' },
    ];

    const lvl = levels[Math.min(score, 5)];
    document.getElementById('strengthText').textContent = lvl.label;
    document.getElementById('strengthText').style.color = lvl.color;
    document.getElementById('barFill').style.width = lvl.width;
    document.getElementById('barFill').style.background = lvl.color;
  }

  function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 Copy Password';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function addToHistory(pass) {
    history.unshift(pass);
    if (history.length > 5) history.pop();

    const box = document.getElementById('historyBox');
    const list = document.getElementById('historyList');
    box.style.display = 'block';

    list.innerHTML = history.map(p => `
      <div class="history-item" onclick="useFromHistory('${p}')">
        <span>${p.substring(0, 28)}${p.length > 28 ? '...' : ''}</span>
        <span>click to use</span>
      </div>
    `).join('');
  }

  function useFromHistory(pass) {
    currentPassword = pass;
    document.getElementById('passDisplay').textContent = pass;
    document.getElementById('passDisplay').classList.remove('empty');
  }
</script>
</body>
</html>
